spring.application.name=mes-backend

spring.datasource.url=jdbc:mysql://localhost:3306/smart_factory_mes?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

mybatis.configuration.map-underscore-to-camel-case=true

mes.simulation.enabled=true
mes.simulation.fixed-delay-ms=5000
mes.simulation.initial-delay-ms=5000
mes.simulation.bootstrap-ticks=12
mes.simulation.dashboard-trend-hours=8